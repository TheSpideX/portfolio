                - button "Outline" [ref=e314] [cursor=pointer]:
                  - img [ref=e315]
              - article [ref=e318]:
                - generic [ref=e319]:
                  - 'heading "System Design Simulator: A Reality-Grounded Distributed Systems Platform" [level=1] [ref=e320]':
                    - strong [ref=e321]: "System Design Simulator: A Reality-Grounded Distributed Systems Platform"
                  - 'link "Permalink: System Design Simulator: A Reality-Grounded Distributed Systems Platform" [ref=e322] [cursor=pointer]':
                    - /url: "#system-design-simulator-a-reality-grounded-distributed-systems-platform"
                    - img [ref=e323]
                - paragraph [ref=e325]:
                  - strong [ref=e326]: The System Design Simulator is a revolutionary platform for engineers to visually design, simulate, and predict the production behavior of complex distributed systems with 90-92% accuracy.
                - paragraph [ref=e327]:
                  - text: This is not just a simulation tool; it is a
                  - strong [ref=e328]: configurable system design laboratory
                  - text: . It serves as a "physics lab for system architecture," enabling students to learn through experimentation, engineers to validate architectures before deployment, and researchers to innovate through exploration.
                - paragraph [ref=e329]:
                  - text: <p align="center">
                  - text: <img src="
                  - link "https://placehold.co/800x400/1e293b/ffffff?text=High-Level+Architecture+Diagram" [ref=e330] [cursor=pointer]:
                    - /url: https://placehold.co/800x400/1e293b/ffffff?text=High-Level+Architecture+Diagram
                  - text: "\" alt=\"High-Level Architecture Diagram\"/>"
                  - text: </p>
                - generic [ref=e331]:
                  - 'heading "🎯 Core Vision: From Theory to Hands-On Experimentation" [level=2] [ref=e332]':
                    - strong [ref=e333]: "🎯 Core Vision: From Theory to Hands-On Experimentation"
                  - 'link "Permalink: 🎯 Core Vision: From Theory to Hands-On Experimentation" [ref=e334] [cursor=pointer]':
                    - /url: "#-core-vision-from-theory-to-hands-on-experimentation"
                    - img [ref=e335]
                - paragraph [ref=e337]: The current state of system design education is largely theoretical. Engineers make critical, multi-million dollar architectural decisions based on guesswork, leading to costly production surprises.
                - paragraph [ref=e338]: "This platform bridges the gap between theory and reality by providing a space to:"
                - list [ref=e339]:
                  - listitem [ref=e340]:
                    - strong [ref=e341]: "Validate Architectures:"
                    - text: Test if your design will handle Black Friday traffic
                    - emphasis [ref=e342]: before
                    - text: you write a single line of production code.
                  - listitem [ref=e343]:
                    - strong [ref=e344]: "Compare Technologies:"
                    - text: Quantitatively compare an Intel vs. AMD CPU or a Redis vs. Memcached layer using real hardware profiles.
                  - listitem [ref=e345]:
                    - strong [ref=e346]: "Learn by Doing:"
                    - text: Visually observe how backpressure cascades through a system or why a specific database becomes a bottleneck under load.
                - generic [ref=e347]:
                  - heading "💡 Key Innovations" [level=2] [ref=e348]:
                    - strong [ref=e349]: 💡 Key Innovations
                  - 'link "Permalink: 💡 Key Innovations" [ref=e350] [cursor=pointer]':
                    - /url: "#-key-innovations"
                    - img [ref=e351]
                - paragraph [ref=e353]: The platform's high accuracy and realism are achieved through several architectural breakthroughs.
                - generic [ref=e354]:
                  - heading "1. ACID-like Isolation & Natural Contention" [level=3] [ref=e355]:
                    - strong [ref=e356]: 1. ACID-like Isolation & Natural Contention
                  - 'link "Permalink: 1. ACID-like Isolation & Natural Contention" [ref=e357] [cursor=pointer]':
                    - /url: "#1-acid-like-isolation--natural-contention"
                    - img [ref=e358]
                - paragraph [ref=e360]:
                  - text: "Each user flow (e.g., \"user login,\" \"product purchase\") executes as if it owns the entire system. These independent flows are then run concurrently against a shared set of components with finite resources. The result:"
                  - strong [ref=e361]: resource contention, bottlenecks, and queue buildups emerge naturally and realistically
                  - text: ", without any complex or artificial coordination logic. This is a computer science breakthrough that mirrors how real microservices behave."
                - generic [ref=e362]:
                  - heading "2. Hardware-Adaptive Tick System" [level=3] [ref=e363]:
                    - strong [ref=e364]: 2. Hardware-Adaptive Tick System
                  - 'link "Permalink: 2. Hardware-Adaptive Tick System" [ref=e365] [cursor=pointer]':
                    - /url: "#2-hardware-adaptive-tick-system"
                    - img [ref=e366]
                - paragraph [ref=e368]:
                  - text: The engine features a unified, goroutine-based architecture that is infinitely scalable. It
                  - strong [ref=e369]: automatically calibrates its simulation tick duration
                  - text: (from 1ms to 10s) based on the scale of the system and the detected capabilities of the underlying hardware (CPU cores, memory). This eliminates the need for complex hybrid models and ensures deterministic, high-performance simulation at any scale.
                - generic [ref=e370]:
                  - heading "3. Profile-Based Reality Grounding" [level=3] [ref=e371]:
                    - strong [ref=e372]: 3. Profile-Based Reality Grounding
                  - 'link "Permalink: 3. Profile-Based Reality Grounding" [ref=e373] [cursor=pointer]':
                    - /url: "#3-profile-based-reality-grounding"
                    - img [ref=e374]
                - paragraph [ref=e376]: "Every behavior in the simulation is grounded in reality, not arbitrary randomness. The engine uses a library of configurable profiles based on:"
                - list [ref=e377]:
                  - listitem [ref=e378]:
                    - strong [ref=e379]: "Real Hardware Specifications:"
                    - text: Performance curves and physical limits from Intel, AMD, Samsung, and Cisco datasheets.
                  - listitem [ref=e380]:
                    - strong [ref=e381]: "Physics-Based Constraints:"
                    - text: Thermal dynamics for CPU throttling and the speed of light for network latency provide absolute, unbreakable bounds.
                  - listitem [ref=e382]:
                    - strong [ref=e383]: "Statistical Convergence:"
                    - text: At scale, system behavior (like cache hit ratios) converges towards predictable statistical patterns, a principle that is mathematically modeled to achieve high accuracy.
                - generic [ref=e384]:
                  - heading "4. Production-Grade Architectural Patterns" [level=3] [ref=e385]:
                    - strong [ref=e386]: 4. Production-Grade Architectural Patterns
                  - 'link "Permalink: 4. Production-Grade Architectural Patterns" [ref=e387] [cursor=pointer]':
                    - /url: "#4-production-grade-architectural-patterns"
                    - img [ref=e388]
                - paragraph [ref=e390]: "The simulator implements and allows users to experiment with real-world patterns used by major tech companies:"
                - list [ref=e391]:
                  - listitem [ref=e392]:
                    - strong [ref=e393]: "Netflix-style Backpressure:"
                    - text: A multi-level health aggregation system and direct health queries allow for graceful degradation under load.
                  - listitem [ref=e394]:
                    - strong [ref=e395]: "Kubernetes-style Service Registry:"
                    - text: A sophisticated two-level registry system manages component discovery and instance health with atomic, race-condition-free coordination.
                - generic [ref=e396]:
                  - 'heading "🏗️ How It Works: The 3-Layer Architecture" [level=2] [ref=e397]':
                    - strong [ref=e398]: "🏗️ How It Works: The 3-Layer Architecture"
                  - 'link "Permalink: 🏗️ How It Works: The 3-Layer Architecture" [ref=e399] [cursor=pointer]':
                    - /url: "#️-how-it-works-the-3-layer-architecture"
                    - img [ref=e400]
                - paragraph [ref=e402]: The platform is built on a three-layer hierarchy that allows for infinite flexibility in system design.
                - list [ref=e403]:
                  - listitem [ref=e404]:
                    - text: "Layer 1: The 4 Universal Base Engines"
                    - text: The foundation consists of 4 universal engines (CPU, Memory, Storage, Network In, Network Out, Coordination), each running in its own goroutine. Their behavior is dictated by the loaded hardware profiles (e.g., "Intel Xeon Gold 6248R," "Samsung 980 PRO NVMe").
                  - listitem [ref=e405]:
                    - text: "Layer 2: Component Composition"
                    - text: Users design components (e.g., a "PostgreSQL Database," a "Redis Cache") by composing the 4 base engines. A database might use all 4 engines, while a simple cache might only use 4 (excluding Storage and Coordination).
                  - listitem [ref=e406]:
                    - text: "Layer 3: System Design"
                    - text: Users build a complete distributed system by arranging and connecting components in a visual canvas, defining the user flows and routing logic between them.
                - generic [ref=e407]:
                  - heading "🛠️ Tech Stack" [level=2] [ref=e408]:
                    - strong [ref=e409]: 🛠️ Tech Stack
                  - 'link "Permalink: 🛠️ Tech Stack" [ref=e410] [cursor=pointer]':
